name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Permissions needed for test reporting and PR comments
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Faster git fetches for cargo
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  # Cache keys for better hit rates
  RUST_CACHE_KEY: v1
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
  # Linux: pkg-config must find glib-2.0.pc (set before any cargo step; only used on Linux)
  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

jobs:
  # ─────────────────────────────────────────────────────────────
  # Rust Checks (fast, single platform)
  # ─────────────────────────────────────────────────────────────
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        uses: ./.github/actions/install-linux-deps

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

      - uses: Swatinem/rust-cache@v2
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

      - name: Check (no features)
        run: cargo check --workspace
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

  # ─────────────────────────────────────────────────────────────
  # TypeScript Checks (fast)
  # ─────────────────────────────────────────────────────────────
  ts-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        uses: ./.github/actions/install-linux-deps
        with:
          verify_glib: 'false'

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Cache pnpm store for faster installs
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

      - name: TypeScript tests with coverage
        run: pnpm exec vitest run -c tests/ts/vitest.config.ts --coverage

      - name: Upload TS test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-typescript
          path: tests/ts/test-results/
          retention-days: 7

      - name: Upload TS coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-typescript
          path: tests/ts/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Rust Tests (cross-platform matrix)
  # ─────────────────────────────────────────────────────────────
  rust-test:
    needs: [rust-check, changes]
    if: "needs.changes.outputs.rust == 'true'"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/install-linux-deps

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Share cache between rust-test and build jobs for faster compilation
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          shared-key: rust-${{ matrix.target }}
          cache-on-failure: true

      # Install cargo-nextest
      - name: Install nextest
        uses: taiki-e/install-action@nextest

      # Run unit tests (fast, no external deps)
      - name: Unit tests
        run: cargo nextest run --workspace --lib --profile ci-unit

      # Run doc tests (nextest doesn't support)
      - name: Doc tests
        run: cargo test --workspace --doc

      # Run integration tests (outputs JUnit XML)
      - name: Integration tests
        run: cargo nextest run -p tests --profile ci-integration

      # Upload test results for reporting (separate artifacts per type)
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-rust-unit-${{ matrix.os }}
          path: target/nextest/ci-unit/junit-unit.xml
          retention-days: 7

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-rust-integration-${{ matrix.os }}
          path: target/nextest/ci-integration/junit-integration.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Build Verification (macOS only - Linux/Windows covered by e2e-desktop)
  # ─────────────────────────────────────────────────────────────
  build:
    needs: [rust-check, ts-check, changes]
    if: "needs.changes.outputs.app == 'true'"
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin
          shared-key: rust-aarch64-apple-darwin
          cache-on-failure: true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Cache pnpm store
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # Cache Tauri CLI binary
      - name: Cache Tauri CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri*
            ~/.cargo/bin/tauri*
          key: tauri-cli-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            tauri-cli-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Resolve updater signing
        id: updater_signing
        uses: ./.github/actions/resolve-updater-signing
        with:
          signing_key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build (with updater signing)
        if: steps.updater_signing.outputs.signing_enabled == 'true'
        run: pnpm build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: '-'

      - name: Build (updater artifacts gated off)
        if: steps.updater_signing.outputs.signing_enabled != 'true'
        run: pnpm --filter @mcpmux/desktop exec tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'
        env:
          APPLE_SIGNING_IDENTITY: '-'

  # ─────────────────────────────────────────────────────────────
  # Test Results Report (separate checks per test type and OS)
  # Uses dorny/test-reporter for granular GitHub Check Runs
  # ─────────────────────────────────────────────────────────────
  test-report:
    needs: [rust-test, ts-check, changes]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results

      # Rust Unit Tests - Per OS
      - name: 'Report: Rust Unit Tests (Linux)'
        uses: dorny/test-reporter@v2
        if: always() && needs.changes.outputs.rust == 'true'
        with:
          name: '🦀 Rust Unit Tests (Linux)'
          path: test-results/test-results-rust-unit-ubuntu-latest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 'Report: Rust Unit Tests (Windows)'
        uses: dorny/test-reporter@v2
        if: always() && needs.changes.outputs.rust == 'true'
        with:
          name: '🦀 Rust Unit Tests (Windows)'
          path: test-results/test-results-rust-unit-windows-latest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 'Report: Rust Unit Tests (macOS)'
        uses: dorny/test-reporter@v2
        if: always() && needs.changes.outputs.rust == 'true'
        with:
          name: '🦀 Rust Unit Tests (macOS)'
          path: test-results/test-results-rust-unit-macos-latest/*.xml
          reporter: java-junit
          fail-on-error: false

      # Rust Integration Tests - Per OS
      - name: 'Report: Rust Integration Tests (Linux)'
        uses: dorny/test-reporter@v2
        if: always() && needs.changes.outputs.rust == 'true'
        with:
          name: '🔗 Rust Integration Tests (Linux)'
          path: test-results/test-results-rust-integration-ubuntu-latest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 'Report: Rust Integration Tests (Windows)'
        uses: dorny/test-reporter@v2
        if: always() && needs.changes.outputs.rust == 'true'
        with:
          name: '🔗 Rust Integration Tests (Windows)'
          path: test-results/test-results-rust-integration-windows-latest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 'Report: Rust Integration Tests (macOS)'
        uses: dorny/test-reporter@v2
        if: always() && needs.changes.outputs.rust == 'true'
        with:
          name: '🔗 Rust Integration Tests (macOS)'
          path: test-results/test-results-rust-integration-macos-latest/*.xml
          reporter: java-junit
          fail-on-error: false

      # TypeScript Tests
      - name: 'Report: TypeScript Tests'
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: '📘 TypeScript Tests'
          path: test-results/test-results-typescript/*.xml
          reporter: jest-junit
          fail-on-error: false

  # ─────────────────────────────────────────────────────────────
  # Coverage Report (uploads to Codecov)
  # ─────────────────────────────────────────────────────────────
  coverage-report:
    needs: [ts-check]
    if: always() && needs.ts-check.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: typescript
          name: mcpmux-ts-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Detect changed areas — gates the heavy jobs (rust matrix, Tauri
  # build, desktop + web E2E) so doc-only or unrelated commits skip
  # them entirely. CI workflow edits intentionally trip every filter.
  # ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      app: ${{ steps.filter.outputs.app }}
      e2e_desktop: ${{ steps.filter.outputs.e2e_desktop }}
      e2e_web: ${{ steps.filter.outputs.e2e_web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'apps/desktop/src-tauri/**'
              - 'apps/desktop/src/commands/**'
              - 'tests/rust/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'clippy.toml'
              - 'rustfmt.toml'
              - '.config/nextest.toml'
              - '.github/**'
            app:
              - 'apps/**'
              - 'packages/**'
              - 'crates/**'
              - 'schemas/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'scripts/**'
              - '.github/**'
            e2e_desktop:
              - 'apps/**'
              - 'crates/**'
              - 'packages/**'
              - 'tests/e2e/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/**'
            e2e_web:
              - 'apps/desktop/**'
              - 'crates/**'
              - 'packages/ui/**'
              - 'tests/e2e/**'
              - 'scripts/admin-e2e-fixture.mjs'
              - 'scripts/cf-access-env.mjs'
              - 'scripts/build-web-admin.mjs'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  # ─────────────────────────────────────────────────────────────
  # E2E Tests (web admin Playwright against a real backend)
  # PRs run the smoke gate; pushes (post-merge) run the full catalog.
  # Skip with [skip e2e] in commit message; auto-skips on unrelated paths.
  # ─────────────────────────────────────────────────────────────
  e2e-web:
    needs: [ts-check, changes]
    if: "needs.changes.outputs.e2e_web == 'true' && !contains(github.event.head_commit.message, '[skip e2e]')"
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        uses: ./.github/actions/install-linux-deps
        with:
          e2e: 'true'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-e2e-web
          shared-key: rust-x86_64-unknown-linux-gnu
          cache-on-failure: true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build web admin SPA
        run: pnpm build:web:admin

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # PR gate — wiring + curated smoke (~few tests, one fixture boot).
      - name: Run web admin UI smoke gate (PR, :1420 → backend :45819)
        if: github.event_name == 'pull_request'
        run: pnpm test:e2e:web:smoke
        env:
          MCPMUX_ADMIN_TEST: '1'

      # Post-merge — full web catalog + admin parity (depth, not on every PR).
      - name: Run full web admin UI suite (push, :1420 → backend :45819)
        if: github.event_name == 'push'
        run: pnpm test:e2e:web --project=chromium
        env:
          MCPMUX_ADMIN_TEST: '1'

      - name: Run admin web E2E tests (push, :45819)
        if: github.event_name == 'push'
        run: pnpm test:e2e:web:admin --project=chromium
        env:
          MCPMUX_ADMIN_TEST: '1'

      - name: Upload E2E web test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-e2e-web
          path: tests/e2e/reports/
          retention-days: 7

      - name: 'Report: E2E Web Tests'
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: '🌐 E2E Web Tests'
          path: tests/e2e/reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: 'Report: E2E Admin Web Tests'
        uses: dorny/test-reporter@v2
        if: github.event_name == 'push'
        with:
          name: '🌐 E2E Admin Web Tests'
          path: tests/e2e/reports/admin-junit.xml
          reporter: java-junit
          fail-on-error: false

  # ─────────────────────────────────────────────────────────────
  # E2E Tests (Desktop app with WebDriver)
  # PR: Windows only. Push (post-merge): Linux + Windows. Skip with [skip e2e].
  # ─────────────────────────────────────────────────────────────
  e2e-desktop:
    needs: [rust-check, ts-check, changes]
    if: "needs.changes.outputs.e2e_desktop == 'true' && !contains(github.event.head_commit.message, '[skip e2e]')"
    uses: ./.github/workflows/e2e-desktop.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      # PR gate: Windows only (~15 min). Post-merge push runs Linux + Windows for full coverage.
      platforms: ${{ github.event_name == 'pull_request' && '["windows-latest"]' || '["ubuntu-latest", "windows-latest"]' }}
    secrets: inherit
